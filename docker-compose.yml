version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: derive-ai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: derive-ai
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - derive-ai-network

  # Optional: MongoDB Express for database management UI
  mongo-express:
    image: mongo-express:latest
    container_name: derive-ai-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    depends_on:
      - mongodb
    networks:
      - derive-ai-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  derive-ai-network:
    driver: bridge
